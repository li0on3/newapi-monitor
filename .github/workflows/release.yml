name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate tag and VERSION
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test "${GITHUB_REF_NAME#v}" = "$version"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Resolve lowercase image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Build one-click installation bundle
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          bundle="newapi-monitor-bundle-$version"
          install -d "$bundle"
          install -m 0644 compose.yaml .env.example VERSION LICENSE "$bundle/"
          install -m 0755 install.sh monitorctl "$bundle/"
          tar -czf "$bundle.tar.gz" -C "$bundle" .
          sha256sum "$bundle.tar.gz" > "$bundle.tar.gz.sha256"

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            install.sh
            newapi-monitor-bundle-${{ steps.version.outputs.value }}.tar.gz
            newapi-monitor-bundle-${{ steps.version.outputs.value }}.tar.gz.sha256
          body: |
            Docker image / Docker 镜像:
            `${{ steps.image.outputs.name }}:${{ steps.version.outputs.value }}`

            One-click install / 一键安装:
            `curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sudo bash`
